libaom-10bit-iq-s5 = { encoder = "aom", format = "yuv10", speed = 5, tune = "iq" }
libaom-12bit-iq-s5 = { encoder = "aom", format = "yuv12", speed = 5, tune = "iq" }

libaom-s6 = { encoder = "aom", format = "yuv8", speed = 6 }
libaom-10bit-s6 = { encoder = "aom", format = "yuv10", speed = 6 }
