rav1e-10bit-s9 = { encoder = "rav1e", format = "yuv10", speed = 9 }
rav1e-12bit-s9 = { encoder = "rav1e", format = "yuv12", speed = 9 }

rav1e-s10 = { encoder = "rav1e", format = "yuv8", speed = 10 }
