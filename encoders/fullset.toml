rav1e-12bit-s10 = { encoder = "rav1e", format = "yuv12", speed = 10 }


# JPEGli has no speed settings
jpegli = { encoder = "jpegli", format = "png8" }
jpegli-16bit = { encoder = "jpegli", format = "png16" }


# JPEG-XL has "effort" values 1-10 (1 is fastest, 10 is slowest), all are fast enough to be worth testing
# As of the time of writing, effort 1 and effort 2 seem to give identical results, so only generate effort 2
jxl-e2 = { encoder = "jpegxl", format = "png8", effort = 2 }
jxl-16bit-e2 = { encoder = "jpegxl", format = "png16", effort = 2 }

jxl-e3 = { encoder = "jpegxl", format = "png8", effort = 3 }
jxl-16bit-e3 = { encoder = "jpegxl", format = "png16", effort = 3 }

jxl-e4 = { encoder = "jpegxl", format = "png8", effort = 4 }
jxl-16bit-e4 = { encoder = "jpegxl", format = "png16", effort = 4 }

jxl-e5 = { encoder = "jpegxl", format = "png8", effort = 5 }
jxl-16bit-e5 = { encoder = "jpegxl", format = "png16", effort = 5 }

jxl-e6 = { encoder = "jpegxl", format = "png8", effort = 6 }
jxl-16bit-e6 = { encoder = "jpegxl", format = "png16", effort = 6 }

jxl-e7 = { encoder = "jpegxl", format = "png8", effort = 7 }
jxl-16bit-e7 = { encoder = "jpegxl", format = "png16", effort = 7 }

jxl-e8 = { encoder = "jpegxl", format = "png8", effort = 8 }
jxl-16bit-e8 = { encoder = "jpegxl", format = "png16", effort = 8 }

jxl-e9 = { encoder = "jpegxl", format = "png8", effort = 9 }
jxl-16bit-e9 = { encoder = "jpegxl", format = "png16", effort = 9 }

jxl-e10 = { encoder = "jpegxl", format = "png8", effort = 10 }
jxl-16bit-e10 = { encoder = "jpegxl", format = "png16", effort = 10 }


