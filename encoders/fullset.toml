# SVT-AV1 has speeds 0-10; again skip speeds 0+1
# This only accepts 8/10-bit inputs
# The optimizations from SVT-AV1-PSY have not yet been fully merged into mainline SVT-AV1,
# so we need to handle that as a separate test set
svt-av1-s2 = { encoder = "svt", format = "yuv8", speed = 2 }
svt-av1-10bit-s2 = { encoder = "svt", format = "yuv10", speed = 2 }

svt-av1-s3 = { encoder = "svt", format = "yuv8", speed = 3 }
svt-av1-10bit-s3 = { encoder = "svt", format = "yuv10", speed = 3 }

svt-av1-s4 = { encoder = "svt", format = "yuv8", speed = 4 }
svt-av1-10bit-s4 = { encoder = "svt", format = "yuv10", speed = 4 }

svt-av1-s5 = { encoder = "svt", format = "yuv8", speed = 5 }
svt-av1-10bit-s5 = { encoder = "svt", format = "yuv10", speed = 5 }

svt-av1-s6 = { encoder = "svt", format = "yuv8", speed = 6 }
svt-av1-10bit-s6 = { encoder = "svt", format = "yuv10", speed = 6 }

svt-av1-s7 = { encoder = "svt", format = "yuv8", speed = 7 }
svt-av1-10bit-s7 = { encoder = "svt", format = "yuv10", speed = 7 }

svt-av1-s8 = { encoder = "svt", format = "yuv8", speed = 8 }
svt-av1-10bit-s8 = { encoder = "svt", format = "yuv10", speed = 8 }

svt-av1-s9 = { encoder = "svt", format = "yuv8", speed = 9 }
svt-av1-10bit-s9 = { encoder = "svt", format = "yuv10", speed = 9 }

svt-av1-s10 = { encoder = "svt", format = "yuv8", speed = 10 }
svt-av1-10bit-s10 = { encoder = "svt", format = "yuv10", speed = 10 }



# RAV1e has speeds 0-10; again skip speeds 0+1
# This accepts 8/10/12-bit inputs
rav1e-s2 = { encoder = "rav1e", format = "yuv8", speed = 2 }
rav1e-10bit-s2 = { encoder = "rav1e", format = "yuv10", speed = 2 }
rav1e-12bit-s2 = { encoder = "rav1e", format = "yuv12", speed = 2 }

