[encoders]
# tinyavif has no speed settings, and only accepts 8-bit inputs
tinyavif = { encoder = "tinyavif", format = "yuv8" }

# As mapped by libavif, libaom has speeds 0-9, and accepts 8/10/12-bit inputs
# Skip speeds 0+1 as they're extremely slow
# libaom also has an "image quality" tune, derived from SVT-AV1-PSY
libaom-s2 = { encoder = "aom", format = "yuv8", speed = 2 }
libaom-10bit-s2 = { encoder = "aom", format = "yuv10", speed = 2 }
libaom-12bit-s2 = { encoder = "aom", format = "yuv12", speed = 2 }
libaom-iq-s2 = { encoder = "aom", format = "yuv8", speed = 2, tune = "iq" }
libaom-10bit-iq-s2 = { encoder = "aom", format = "yuv10", speed = 2, tune = "iq" }
libaom-12bit-iq-s2 = { encoder = "aom", format = "yuv12", speed = 2, tune = "iq" }

libaom-s3 = { encoder = "aom", format = "yuv8", speed = 3 }
libaom-10bit-s3 = { encoder = "aom", format = "yuv10", speed = 3 }
libaom-12bit-s3 = { encoder = "aom", format = "yuv12", speed = 3 }
libaom-iq-s3 = { encoder = "aom", format = "yuv8", speed = 3, tune = "iq" }
libaom-10bit-iq-s3 = { encoder = "aom", format = "yuv10", speed = 3, tune = "iq" }
libaom-12bit-iq-s3 = { encoder = "aom", format = "yuv12", speed = 3, tune = "iq" }

libaom-s4 = { encoder = "aom", format = "yuv8", speed = 4 }
libaom-10bit-s4 = { encoder = "aom", format = "yuv10", speed = 4 }
