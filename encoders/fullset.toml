libaom-10bit-iq-s4 = { encoder = "aom", format = "yuv10", speed = 4, tune = "iq" }
libaom-12bit-iq-s4 = { encoder = "aom", format = "yuv12", speed = 4, tune = "iq" }

libaom-s5 = { encoder = "aom", format = "yuv8", speed = 5 }
libaom-10bit-s5 = { encoder = "aom", format = "yuv10", speed = 5 }
